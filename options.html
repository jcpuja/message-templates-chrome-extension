<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-i18n="optionsPageTitle">Message Templates Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main>
      <h1 data-i18n="optionsHeading">Message Templates</h1>
      <p data-i18n="optionsDescription">Configure the templates shown in the context menu.</p>

      <form id="template-form">
        <label for="template-name" data-i18n="templateNameLabel">Name</label>
        <input id="template-name" name="name" type="text" maxlength="80" required />

        <label for="template-text" data-i18n="templateTextLabel">Text</label>
        <textarea id="template-text" name="text" rows="4" required></textarea>

        <div class="form-actions">
          <button id="form-submit-button" type="submit" data-i18n="addTemplateButton">
            Add template
          </button>
          <button
            id="form-cancel-button"
            type="button"
            class="secondary"
            hidden
            data-i18n="cancelEditButton"
          >
            Cancel edit
          </button>
        </div>
      </form>

      <section class="transfer-actions" aria-label="Template backup and restore">
        <button id="export-templates-button" type="button" class="secondary" data-i18n="exportTemplatesButton">
          Export templates
        </button>
        <button id="import-templates-button" type="button" class="secondary" data-i18n="importTemplatesButton">
          Import templates
        </button>
        <input id="import-templates-input" type="file" accept="application/json,.json" hidden />
      </section>

      <p id="status" role="status" aria-live="polite"></p>
      <ul id="template-list"></ul>
    </main>

    <script src="template-store.js"></script>
    <script src="options.js"></script>
  </body>
</html>
